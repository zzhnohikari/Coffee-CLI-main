<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Coffee CLI — Your Multi-Agent AI Terminal Companion." />
    <title>Coffee CLI</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Preload bundled Inter weights so the browser warms its font cache during
         startup. Without this, Inter loads lazily the first time a glyph in its
         range is needed for paint — most visibly when the language menu opens
         (Cyrillic "Русский", Vietnamese "Tiếng Việt", and the glyph badges hit
         characters not yet seen elsewhere). The lazy load + font-display: swap
         caused a visible font jitter as rows reflowed from system fallback to
         Inter. Each weight is ~22KB local, so preloading all four costs ~90KB
         of startup bandwidth (zero on disk-loaded Tauri WebView2) in exchange
         for jitter-free first paint anywhere Inter is used. -->
    <link rel="preload" href="/fonts/inter-400.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/fonts/inter-500.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/fonts/inter-600.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/fonts/inter-700.woff2" as="font" type="font/woff2" crossorigin>
    <!-- Apply theme + shape BEFORE React renders to prevent flash of unstyled variables -->
    <script>
      (function() {
        var theme = 'dark';
        var shape = 'soft';
        try { theme = localStorage.getItem('cc-theme') || 'dark'; } catch(e) {}
        try { shape = localStorage.getItem('cc-shape') || 'soft'; } catch(e) {}
        document.documentElement.setAttribute('data-theme', theme);
        document.documentElement.setAttribute('data-shape', shape);
      })();
    </script>
    <!-- emulators: DOSBox WASM engine for Coffee Play arcade (no UI deps) -->
    <script src="/js-dos/emulators/emulators.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
